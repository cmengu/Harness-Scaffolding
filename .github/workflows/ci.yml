# CI smoke (further_steps step 2c): the whole debate loop runs on stub heads —
# no API keys, no network calls, no cost. A green badge = "clone-and-test works".
name: ci

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: harness-project
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"     # floor version: tomllib landed in 3.11
      - run: pip install -e ".[dev]"
      - run: council --version       # install smoke: the entry point resolves
      - run: pytest -q
